<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 선물 뽑기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .control-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        /* 배경음악 버튼 */
        .bgm-btn {
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #fff;
            color: #2c3e50;
            border: 2px solid #2c3e50;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bgm-btn.active {
            background-color: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        /* 4행 5열 격자 배열 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 900px;
            width: 100%;
            perspective: 1000px;
        }

        /* 카드 스타일 */
        .card {
            height: 130px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.open {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            box-sizing: border-box;
            padding: 10px;
        }

        /* 앞면 (번호) */
        .card-front {
            background: linear-gradient(135deg, #ff7675, #d63031);
            color: white;
            font-size: 2rem;
            font-weight: bold;
            border: 2px solid #ff7675;
        }

        /* 뒷면 (선물 이름) */
        .card-back {
            background: linear-gradient(135deg, #00cec9, #00b894);
            color: white;
            transform: rotateY(180deg);
            font-size: 1.05rem;
            font-weight: bold;
            text-align: center;
            word-break: keep-all;
            line-height: 1.4;
        }

        /* 하단 버튼 */
        .reset-btn {
            margin-top: 35px;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .reset-btn:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <h1>🎁 행운의 선물 뽑기 🎁</h1>
    
    <div class="control-panel">
        <button id="bgmBtn" class="bgm-btn" onclick="toggleBGM()">🎵 신나는 BGM 켜기</button>
    </div>
    
    <div class="grid-container" id="cardGrid"></div>

    <button class="reset-btn" onclick="resetGame()">🔄 다시 뽑기 화면으로 (초기화)</button>

    <script>
        const gifts = [
            "착즙기", "보온보냉병", "노트북(중고)", "보드게임\n(스플렌더)", "후라이팬",
            "후라이팬1", "후라이팬2", "그릴(고급)", "바디샤워세트", "우산",
            "핸드백", "차세트", "아웃도어바지M\n(네파)", "쿠쿠전기밥솥", "글럭마사지기",
            "원목도마", "크로스백", "마사지건", "퀼트 컵받침\n8세트", "차세트"
        ];

        const cardGrid = document.getElementById('cardGrid');
        const bgmBtn = document.getElementById('bgmBtn');
        
        // 브라우저 자체 오디오 시스템 생성
        let audioCtx = null;
        let bgmInterval = null;
        let isBgmPlaying = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 100% 자체 생성되는 효과음 (짜잔! 팡파르 느낌)
        function playFlipSound() {
            initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;
            
            // 두 개의 음을 연달아 연주하여 '따-단!' 효과 생성
            playTone(523.25, now, 0.15); // 도 (C5)
            playTone(659.25, now + 0.1, 0.15); // 미 (E5)
            playTone(783.99, now + 0.2, 0.4); // 솔 (G5) 최후의 일격
        }

        // 음을 만들어내는 핵심 함수
        function playTone(freq, startTime, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // 더 풍성하고 경쾌한 예능 느낌을 위해 'triangle(삼각파)' 무대음 선택
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(freq, startTime);
            
            gain.gain.setValueAtTime(0.3, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        // 100% 자체 생성되는 배경음악 (신나는 8비트 오락실 댄스 풍 비트)
        function startBGM() {
            initAudio();
            let step = 0;
            // 경쾌한 예능 멜로디 무한 반복 코드
            const melody = [523, 587, 659, 523, 659, 523, 784, 392, 440, 523, 523, 440, 392, 523, 587, 784];
            
            bgmInterval = setInterval(() => {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                
                // 경쾌하고 빠른 비트 연주
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(melody[step % melody.length], now);
                
                gain.gain.setValueAtTime(0.08, now); // 배경음이므로 볼륨은 은은하게
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.25);
                
                step++;
            }, 180); // 속도감 있는 박자 (신나는 비트)
        }

        function stopBGM() {
            clearInterval(bgmInterval);
        }

        // 배경음악 버튼 토글
        function toggleBGM() {
            initAudio();
            if (isBgmPlaying) {
                stopBGM();
                bgmBtn.innerText = "🎵 신나는 BGM 켜기";
                bgmBtn.classList.remove('active');
            } else {
                startBGM();
                bgmBtn.innerText = "🔇 배경음악 끄기";
                bgmBtn.classList.add('active');
            }
            isBgmPlaying = !isBgmPlaying;
        }

        // 보드 구성
        function createBoard() {
            cardGrid.innerHTML = ''; 
            for (let i = 1; i <= 20; i++) {
                const card = document.createElement('div');
                card.classList.add('card');
                
                const front = document.createElement('div');
                front.classList.add('card-face', 'card-front');
                front.innerText = i;

                const back = document.createElement('div');
                back.classList.add('card-face', 'card-back');
                back.innerText = gifts[i - 1]; 

                card.appendChild(front);
                card.appendChild(back);

                card.addEventListener('click', function() {
                    if (!card.classList.contains('open')) {
                        card.classList.add('open');
                        playFlipSound(); // 카드를 뒤집을 때 짜잔 소리 재생!
                    }
                });

                cardGrid.appendChild(card);
            }
        }

        function resetGame() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.classList.remove('open');
            });
        }

        createBoard();
    </script>
</body>
</html>
